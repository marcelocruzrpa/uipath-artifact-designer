name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please search
        [existing issues](https://github.com/marcelocruzrpa/uipath-artifact-designer/issues?q=is%3Aissue)
        first so we can keep the discussion in one place. Describe the **use
        case** and the **problem** you are trying to solve — not only the
        solution you have in mind.

  - type: checkboxes
    id: prereqs
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this is not already requested.
          required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What are you trying to accomplish?
      placeholder: As a developer working on a Maestro Flow, I want to...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What about the current behavior makes that difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: One idea — not necessarily the only one.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they were not enough.

  - type: dropdown
    id: artifact-type
    attributes:
      label: Artifact type affected
      options:
        - "agent.json (low-code agent)"
        - "*.flow (Maestro Flow)"
        - "*.bpmn (Maestro BPMN)"
        - "caseplan.json (Maestro Case)"
        - "action-schema.json (Coded App)"
        - "All / cross-cutting"
        - "Other / not artifact-specific"

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, prior art.
